<script>
    // 1. ตั้งค่า URL ของ Google Apps Script (เอา URL ที่คุณก๊อปมาวางตรงนี้)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwojYICmhIQcBuIkV3IABvLzOY9oj5eMpxO1xVzmUKIAWQRebBL26slR3JWhEjaRDoE/exec";

    let transactions = [];
    let jointBudget = parseFloat(localStorage.getItem('jointBudget')) || 10000;
    
    // ตั้งค่าเวลาปัจจุบัน
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('datetime').value = now.toISOString().slice(0, 16);

    // 2. ฟังก์ชันดึงข้อมูลจาก Google Sheets (โหลดตอนเปิดแอป)
    async function loadData() {
        document.getElementById('saveBtn').innerText = "กำลังโหลดข้อมูล...";
        try {
            const response = await fetch(SCRIPT_URL);
            transactions = await response.json();
            updateUI();
        } catch (error) {
            console.error("Error loading data:", error);
            alert("โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่");
        } finally {
            document.getElementById('saveBtn').innerText = "บันทึกข้อมูล (Enter)";
        }
    }

    // 3. ฟังก์ชันบันทึกข้อมูลลง Google Sheets
    async function saveTransaction() {
        const id = document.getElementById('editId').value || Date.now().toString();
        const datetime = document.getElementById('datetime').value;
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const owner = document.getElementById('owner').value;
        const type = document.getElementById('type').value;

        if (!amount || amount <= 0) {
            alert('กรุณากรอกจำนวนเงินให้ถูกต้อง');
            return;
        }

        const data = { action: 'save', id, datetime, desc, amount, owner, type };

        document.getElementById('saveBtn').innerText = "กำลังบันทึก...";
        document.getElementById('saveBtn').disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            
            // หลังจากบันทึกสำเร็จ ให้โหลดข้อมูลใหม่ทั้งหมด
            await loadData();
            resetForm();
        } catch (error) {
            alert("บันทึกไม่สำเร็จ กรุณาลองใหม่");
        } finally {
            document.getElementById('saveBtn').disabled = false;
            document.getElementById('saveBtn').innerText = "บันทึกข้อมูล (Enter)";
        }
    }

    // --- ส่วนที่เหลือเหมือนเดิม แต่เปลี่ยนการจัดการ Array เป็นการเรียก loadData ---

    function adjustJointBudget(val) {
        jointBudget += val;
        if (jointBudget < 0) jointBudget = 0;
        localStorage.setItem('jointBudget', jointBudget);
        updateUI();
    }

    function resetForm() {
        document.getElementById('editId').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('formTitle').innerText = 'บันทึกรายการ';
        document.getElementById('cancelBtn').style.display = 'none';
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('datetime').value = now.toISOString().slice(0, 16);
    }

    function updateUI() {
        let tackCash = 0, noonCash = 0, totalSavings = 0, jointSpent = 0;
        const historyTackEl = document.getElementById('historyTack');
        const historyNoonEl = document.getElementById('historyNoon');
        const historySavingsEl = document.getElementById('historySavings');
        
        historyTackEl.innerHTML = '';
        historyNoonEl.innerHTML = '';
        historySavingsEl.innerHTML = '';

        // เรียงลำดับจากใหม่ไปเก่า
        const sortedData = [...transactions].reverse();

        sortedData.forEach(t => {
            let itemHtml = `<div class="item"><div style="flex:1;"><div style="font-weight:600; font-size:0.85rem;">${t.desc}</div><small style="color:#94a3b8; font-size:0.7rem;">${t.datetime.replace('T', ' ')}</small></div><div style="text-align:right;">`;

            const amt = parseFloat(t.amount);
            if (t.type === 'expense') {
                itemHtml += `<span class="amt-minus">-฿${amt.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>`;
                if (t.owner === 'ติณห์ภัทร') tackCash -= amt;
                if (t.owner === 'นัฐณวรรณ') noonCash -= amt;
                jointSpent += amt;
            } else if (t.type === 'income') {
                itemHtml += `<span class="amt-plus">+฿${amt.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>`;
                if (t.owner === 'ติณห์ภัทร') tackCash += amt;
                if (t.owner === 'นัฐณวรรณ') noonCash += amt;
            } else if (t.type === 'save_in') {
                itemHtml += `<span class="amt-save">➡️ ฿${amt.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>`;
                if (t.owner === 'ติณห์ภัทร') tackCash -= amt;
                if (t.owner === 'นัฐณวรรณ') noonCash -= amt;
                totalSavings += amt;
            } else if (t.type === 'save_out') {
                itemHtml += `<span class="amt-plus">⬅️ ฿${amt.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>`;
                if (t.owner === 'ติณห์ภัทร') tackCash += amt;
                if (t.owner === 'นัฐณวรรณ') noonCash += amt;
                totalSavings -= amt;
            }

            itemHtml += `</div></div>`;

            if (t.type === 'save_in' || t.type === 'save_out') {
                historySavingsEl.innerHTML += itemHtml;
            } else if (t.owner === 'ติณห์ภัทร') {
                historyTackEl.innerHTML += itemHtml;
            } else if (t.owner === 'นัฐณวรรณ') {
                historyNoonEl.innerHTML += itemHtml;
            }
        });

        document.getElementById('tackBalance').innerText = `฿${tackCash.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('noonBalance').innerText = `฿${noonCash.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('totalSavings').innerText = `฿${totalSavings.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('netTotal').innerText = `฿${(tackCash + noonCash + totalSavings).toLocaleString(undefined, {minimumFractionDigits: 2})}`;

        const remaining = jointBudget - jointSpent;
        document.getElementById('jointBudgetTxt').innerText = `฿${jointBudget.toLocaleString()}`;
        document.getElementById('jointSpentTxt').innerText = `ใช้ไป: ฿${jointSpent.toLocaleString()}`;
        document.getElementById('jointRemainingTxt').innerText = `คงเหลือ: ฿${remaining.toLocaleString()}`;
        
        let percent = (jointSpent / jointBudget) * 100;
        if (percent > 100) percent = 100;
        if (jointBudget === 0) percent = 0;
        document.getElementById('jointProgressBar').style.width = percent + '%';
    }

    // โหลดข้อมูลเมื่อเปิดเว็บ
    loadData();
</script>
