<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home T&N - Daily Tracker</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.9);
            --primary: #38bdf8; --income: #4ade80; --expense: #f87171; --saving: #c084fc;
        }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: #f1f5f9; margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .user-stat { background: var(--card); padding: 15px; border-radius: 20px; border-top: 4px solid var(--primary); }
        .user-stat.n { border-top-color: #f472b6; }
        .stat-row { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.9rem; }
        .total-vault { background: linear-gradient(135deg, #1e293b, #334155); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid var(--saving); }
        .form-section { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; font-family: 'Kanit'; box-sizing: border-box; }
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        button { padding: 12px; border-radius: 10px; border: none; cursor: pointer; color: white; font-weight: 600; font-family: 'Kanit'; transition: 0.2s; }
        .btn-inc { background: var(--income); } .btn-exp { background: var(--expense); }
        .btn-sav-in { background: var(--saving); } .btn-sav-out { background: #64748b; }
        .history { background: var(--card); padding: 15px; border-radius: 20px; max-height: 400px; overflow-y: auto; }
        .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; }
        .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
        .tag-t { background: rgba(56, 189, 248, 0.2); color: var(--primary); }
        .tag-n { background: rgba(244, 114, 182, 0.2); color: #f472b6; }
        .loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000; }
    </style>
</head>
<body>

<div class="loading" id="loader">⏳ กำลังบันทึกข้อมูล...</div>

<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="margin:0; color: var(--primary); font-size: 2rem;">🏠 Home T&N</h2>
        <div id="clock" style="font-size: 0.9rem; color: #94a3b8;">00:00:00</div>
    </div>

    <div class="total-vault">
        <div style="font-size: 0.8rem; color: var(--saving); text-transform: uppercase;">💰 เงินเก็บรวมในคลัง</div>
        <h1 id="vault-total" style="margin: 5px 0; font-size: 2.5rem;">0.00</h1>
    </div>

    <div class="dashboard-grid">
        <div class="user-stat">
            <strong style="color:var(--primary)">ติณห์ภัทร</strong>
            <div class="stat-row"><span>เงินเข้า:</span><span id="t-inc" style="color:var(--income)">0</span></div>
            <div class="stat-row"><span>เงินออก:</span><span id="t-exp" style="color:var(--expense)">0</span></div>
            <div class="stat-row"><span>ออมส่วนตัว:</span><span id="t-sav" style="color:var(--saving)">0</span></div>
        </div>
        <div class="user-stat n">
            <strong style="color:#f472b6">นัฐณวรรณ</strong>
            <div class="stat-row"><span>เงินเข้า:</span><span id="n-inc" style="color:var(--income)">0</span></div>
            <div class="stat-row"><span>เงินออก:</span><span id="n-exp" style="color:var(--expense)">0</span></div>
            <div class="stat-row"><span>ออมส่วนตัว:</span><span id="n-sav" style="color:var(--saving)">0</span></div>
        </div>
    </div>

    <div class="form-section">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <select id="user"><option value="ติณห์ภัทร">ติณห์ภัทร</option><option value="นัฐณวรรณ">นัฐณวรรณ</option></select>
            <input type="date" id="date">
        </div>
        <select id="category">
            <option value="เงินเดือน">💰 เงินเดือน</option>
            <option value="OT">⚡ OT / เงินเสริม</option>
            <option value="ค่าอาหาร">🍱 ค่าอาหาร</option>
            <option value="อาหารสัตว์">🐾 อาหารสัตว์</option>
            <option value="ของใช้รายวัน">🧺 ของใช้รายวัน</option>
            <option value="ค่าบ้าน/รถ">🏠 ค่าบ้าน/รถ</option>
            <option value="ค่าน้ำมัน">⛽ ค่าน้ำมัน</option>
            <option value="ค่าเน็ต/ไฟ">🌐 ค่าเน็ต/ไฟ/น้ำ</option>
            <option value="เงินเก็บรวม">🏦 จัดการเงินเก็บ (ฝาก/ถอน)</option>
            <option value="อื่นๆ">📝 อื่นๆ</option>
        </select>
        <input type="number" id="amount" placeholder="ระบุจำนวนเงิน..." onkeydown="if(event.key==='Enter') sendData('expense')">
        
        <div class="btn-grid">
            <button class="btn-inc" onclick="sendData('income')">เงินเข้า</button>
            <button class="btn-exp" onclick="sendData('expense')">เงินออก</button>
            <button class="btn-sav-in" onclick="sendData('saving-in')">ฝากเข้าเงินเก็บ</button>
            <button class="btn-sav-out" onclick="sendData('saving-out')">ถอนเงินเก็บออก</button>
        </div>
    </div>

    <div class="history">
        <h4 style="margin: 0 0 10px 0; color: #94a3b8;">ประวัติรายการล่าสุด</h4>
        <div id="list">กำลังโหลดข้อมูล...</div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbztujvkMN3_8lUxuyR4TJy4MS9Gy8tNmBVyVPR2CF5MbV_zLQyesCDNdFR82KN3oEiS/exec";

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('th-TH'); }, 1000);
    document.getElementById('date').valueAsDate = new Date();

    async function sendData(type) {
        const amount = document.getElementById('amount').value;
        if(!amount || amount <= 0) return alert("กรุณาระบุเงิน");
        document.getElementById('loader').style.display = 'flex';
        
        const payload = {
            user: document.getElementById('user').value,
            category: document.getElementById('category').value,
            amount: parseFloat(amount),
            type: type,
            date: document.getElementById('date').value
        };

        try {
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            document.getElementById('amount').value = "";
            await loadData();
        } catch (e) { alert("เกิดข้อผิดพลาดในการบันทึก"); }
        document.getElementById('loader').style.display = 'none';
    }

    async function loadData() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            updateUI(data);
        } catch (e) { document.getElementById('list').innerText = "โหลดข้อมูลไม่สำเร็จ"; }
    }

    function updateUI(rows) {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = "";
        let vault = 0;
        let stats = { 'ติณห์ภัทร': {inc:0, exp:0, sav:0}, 'นัฐณวรรณ': {inc:0, exp:0, sav:0} };

        rows.forEach(row => {
            const [time, user, cat, amt, type] = row;
            const val = parseFloat(amt);
            if(type === 'saving-in') vault += val;
            if(type === 'saving-out') vault -= val;
            if(type === 'income') stats[user].inc += val;
            if(type === 'expense') stats[user].exp += val;
            if(type === 'saving-in') stats[user].sav += val;
            if(type === 'saving-out') stats[user].sav -= val;
        });

        document.getElementById('vault-total').innerText = vault.toLocaleString(undefined,{minimumFractionDigits:2});
        document.getElementById('t-inc').innerText = stats['ติณห์ภัทร'].inc.toLocaleString();
        document.getElementById('t-exp').innerText = stats['ติณห์ภัทร'].exp.toLocaleString();
        document.getElementById('t-sav').innerText = stats['ติณห์ภัทร'].sav.toLocaleString();
        document.getElementById('n-inc').innerText = stats['นัฐณวรรณ'].inc.toLocaleString();
        document.getElementById('n-exp').innerText = stats['นัฐณวรรณ'].exp.toLocaleString();
        document.getElementById('n-sav').innerText = stats['นัฐณวรรณ'].sav.toLocaleString();

        rows.reverse().slice(0, 20).forEach(row => {
            const [time, user, cat, amt, type] = row;
            const isT = user === 'ติณห์ภัทร';
            const color = type === 'income' ? 'var(--income)' : (type.includes('saving') ? 'var(--saving)' : 'var(--expense)');
            listDiv.innerHTML += `
                <div class="item">
                    <div>
                        <span class="tag ${isT ? 'tag-t' : 'tag-n'}">${user}</span> <strong>${cat}</strong><br>
                        <small style="color:#94a3b8">${new Date(time).toLocaleTimeString('th-TH')} (${type === 'saving-in' ? 'ฝากออม' : (type === 'saving-out' ? 'ถอนออม' : 'จ่าย/รับ')})</small>
                    </div>
                    <div style="color:${color}; font-weight:600;">${type==='income'||type==='saving-out' ? '+' : '-'}${parseFloat(amt).toLocaleString()}</div>
                </div>`;
        });
    }
    loadData();
</script>
</body>
</html>
